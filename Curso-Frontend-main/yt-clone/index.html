<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT CLONE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

</head>
<body>
<div class="video-preview">
    <div class="thumbnail-row">
        <img class="thumbnail" src="../miniaturas/mrb.png" alt="Mrbeast">
    </div>
    <div>
        <div class="channel-picture">
            <img class="profile-picture" src="../miniaturas/mrb-profile.png" alt="Profile Picture">
        </div>
        <div class="video-info">
            <p class="video-title">
                Trapped On An Island Until I Build A Boat
            </p>
            <p class="video-author">
                Mrbeast
            </p>
            <p class="video-stats">
                95M views · 12 days ago
            </p>
        </div>
    </div>
</div>

<div class="video-preview">
    <div class="thumbnail-row">
        <img class="thumbnail" src="../miniaturas/mrb2.png" alt="Mrbeast">
    </div>
    <div>
        <div class="channel-picture">
            <img class="profile-picture" src="../miniaturas/mrb-profile.png" alt="Profile Picture">
        </div>
        <div class="video-info">
            <p class="video-title">
                Survive 30 Days Stranded With Your Ex, Win $250,000
            </p>
            <p class="video-author">
                Mrbeast
            </p>
            <p class="video-stats">
                108M views · 3 weeks ago
            </p>
        </div>
    </div>
</div>

<div class="user-row">
    <div class="user-info">
        <img class="animal-photos" src="../miniaturas/gato.png" alt="Oliver">
    <div>
        <strong>Oliver</strong>
        <p>The cat</p>
        <p>Popular</p>
    </div>
</div>
    <button class="follow-btn">Follow</button>
</div>

<div class="user-row">
    <div class="user-info">
            <img class="animal-photos" src="../miniaturas/perro.png" alt="Max">
        <div>
            <strong>Max</strong>
            <p>The Dog</p>
            <p>Guau</p>
        </div>
    </div>
        <button class="follow-btn">Follow</button>
</div>

<div class="user-row">
    <div class="user-info">
            <img class="animal-photos" src="../miniaturas/loro.png" alt="Poli">
        <div class="text-details">
            <strong>Poli</strong>
            <p>The bird</p>
            <p>Agngry bird</p>
        </div>
    </div>
        <button class="follow-btn">Follow</button>
</div>
</body>
</html>
